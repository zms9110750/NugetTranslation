name: Translate NuGet XML

on:
  workflow_dispatch:
    inputs:
      packageId:
        description: 'NuGet package ID'
        required: true
      version:
        description: 'Package version'
        default: '*'

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # 允许写入代码
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download and translate
        env:
          API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: dotnet run  --configuration Release --packageId "${{ inputs.packageId }}"  --packageVersion "${{ inputs.version }}"
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/ || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Translate ${{ inputs.packageId }} v${{ inputs.version }}"
          git push
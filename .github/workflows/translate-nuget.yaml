name: Translate NuGet XML

on:
  workflow_dispatch:
    inputs:
      packageId:
        description: 'NuGet package ID'
        required: true
      version:
        description: 'Package version'
        default: '*'
      language:
        description: 'Target language code'
        default: 'zh-Hans'

jobs:
  translate:
    runs-on: ubuntu-latest
    environment: chat 
    permissions:
      contents: write    # 允许写入代码
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download and translate
        env:
          APIKEY: ${{ secrets.APIKEY }}
          ENDPOINT: ${{ vars.ENDPOINT }}
          MODEL: ${{ vars.MODEL }}
        run: dotnet run  --configuration Release --packageId "${{ inputs.packageId }}"  --packageVersion "${{ inputs.version }}" ----language "${{ inputs.language }}"
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 诊断：看看当前状态
          echo "=== 当前仓库状态 ==="
          git status
          echo ""
          
          echo "=== 被忽略的文件 ==="
          git status --ignored
          echo ""
          
          echo "=== packages/ 是否被忽略 ==="
          git check-ignore -v packages/ || echo "没有被忽略"
          echo ""
          
          echo "=== 尝试添加 ==="
          git add -A
          git status
          echo ""
          
          echo "=== 尝试提交 ==="
          git diff --cached --quiet || git commit -m "Translate Polly.RateLimiting @ *"
          git push
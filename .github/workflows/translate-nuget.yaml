name: Translate NuGet XML

on:
  workflow_dispatch:
    inputs:
      packageId:
        description: 'NuGet package ID'
        required: true
      version:
        description: 'Package version'
        default: '*'
      language:
        description: 'Target language code'
        default: 'zh-Hans'

jobs:
  translate: 
    runs-on: ubuntu-latest
    if: github.actor == github.repository_owner
    environment: chat 
    permissions:
      contents: write
    defaults:
      run:
        working-directory: src/NugetTranslation
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download and translate
        env:
          APIKEY: ${{ secrets.APIKEY }}
          ENDPOINT: ${{ vars.ENDPOINT }}
          MODEL: ${{ vars.MODEL }}
        run: dotnet run -c Release -- "${{ inputs.language }}" --profile github translate "${{ inputs.packageId }}@${{ inputs.version }}"
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull origin master --rebase || true
          git add -A
          git commit -m "#:package:[${{ inputs.language }}] ${{ inputs.packageId }} @ ${{ inputs.version }}" || true
          git push origin master
      
  notify:
     if: github.actor != github.repository_owner
     runs-on: ubuntu-latest
     steps:
       - name: Skip notification
         run: |
           echo "只有仓库所有者可以运行此 Action"
           echo "触发者：${{ github.actor }}"
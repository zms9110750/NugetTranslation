name: Translate NuGet XML

on:
  workflow_dispatch:
    inputs:
      packageId:
        description: 'NuGet package ID'
        required: true
      version:
        description: 'Package version'
        default: '*'
      language:
        description: 'Target language code'
        default: 'zh-Hans'

jobs:
  translate:
    runs-on: ubuntu-latest
    environment: chat 
    permissions:
      contents: write    # 允许写入代码
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download and translate
        env:
          APIKEY: ${{ secrets.APIKEY }}
          ENDPOINT: ${{ vars.ENDPOINT }}
          MODEL: ${{ vars.MODEL }}
        run: dotnet run  --configuration Release --packageId "${{ inputs.packageId }}"  --packageVersion "${{ inputs.version }}" ----language "${{ inputs.language }}"
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull origin master --rebase || true
          git add -A
          git commit -m "Translate ${{ inputs.packageId }} @ ${{ inputs.version }}" || true
          git push origin master